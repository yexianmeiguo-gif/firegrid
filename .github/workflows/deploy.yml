name: Deploy to Tencent CloudBase

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  NODE_VERSION: '18'
  CLOUDBASE_ENV_ID: ${{ secrets.CLOUDBASE_ENV_ID }}

jobs:
  # 测试和构建
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
      # 移除缓存配置，避免 package-lock.json 缺失问题
        
    - name: Install dependencies
      run: |
        cd backend
        npm install
        
    - name: Generate Prisma Client
      run: |
        cd backend
        npx prisma generate
      env:
        DATABASE_URL: ${{ secrets.DATABASE_URL }}
        
    - name: Run tests
      run: |
        cd backend
        npm run test -- --passWithNoTests || true
      env:
        DATABASE_URL: ${{ secrets.DATABASE_URL }}
        JWT_SECRET: ${{ secrets.JWT_SECRET }}
        
    - name: Build TypeScript
      run: |
        cd backend
        npm run build
      env:
        DATABASE_URL: ${{ secrets.DATABASE_URL }}
        JWT_SECRET: ${{ secrets.JWT_SECRET }}
        TENCENTCLOUD_SECRET_ID: ${{ secrets.TENCENTCLOUD_SECRET_ID }}
        TENCENTCLOUD_SECRET_KEY: ${{ secrets.TENCENTCLOUD_SECRET_KEY }}
    
    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: backend-dist
        path: backend/dist
        retention-days: 1

  # 数据库迁移
  migrate:
    runs-on: ubuntu-latest
    needs: build
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        
    - name: Install dependencies
      run: |
        cd backend
        npm install
        
    - name: Generate Prisma Client
      run: |
        cd backend
        npx prisma generate
        
    - name: Run database migrations
      run: |
        cd backend
        npx prisma migrate deploy
      env:
        DATABASE_URL: ${{ secrets.DATABASE_URL }}

  # 部署到 CloudBase
  deploy:
    runs-on: ubuntu-latest
    needs: [build, migrate]
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Download build artifacts
      uses: actions/download-artifact@v4
      with:
        name: backend-dist
        path: backend/dist
        
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        
    - name: Install CloudBase CLI
      run: npm install -g @cloudbase/cli
      
    - name: Login to CloudBase
      run: |
        cloudbase login --apiKeyId "${{ secrets.TENCENTCLOUD_SECRET_ID }}" --apiKey "${{ secrets.TENCENTCLOUD_SECRET_KEY }}"
      
    - name: Deploy to CloudBase
      run: |
        cd backend
        # 复制必要文件到 dist 目录
        cp package.json dist/
        cp -r prisma dist/ 2>/dev/null || true
        
        # 部署
        cloudbase framework:deploy --envId ${{ secrets.CLOUDBASE_ENV_ID }}
      env:
        TENCENTCLOUD_SECRET_ID: ${{ secrets.TENCENTCLOUD_SECRET_ID }}
        TENCENTCLOUD_SECRET_KEY: ${{ secrets.TENCENTCLOUD_SECRET_KEY }}
        CLOUDBASE_ENV_ID: ${{ secrets.CLOUDBASE_ENV_ID }}

  # 通知
  notify:
    runs-on: ubuntu-latest
    needs: deploy
    if: always()
    
    steps:
    - name: Notify deployment status
      run: |
        if [ "${{ needs.deploy.result }}" == "success" ]; then
          echo "🎉 FireGrid 部署成功！"
        else
          echo "❌ FireGrid 部署失败，请检查日志"
        fi
